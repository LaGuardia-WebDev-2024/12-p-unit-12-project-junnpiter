<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>How Well Do You Know Jun?</h1>
    <hr />
    <!-- Bias Question -->
    <form id="dkb-form">
      <label>
        Who is my DKB bias?
        <select id="dkb-answer">
          <option value="dkb1">Lune</option>
          <option value="dkb2">Heechan</option>
          <option value="dkb3">Harry-June</option>
          <option value="dkb4">idk stop yelling at me</option>
        </select>
      </label>
      <button type="submit">Do you remember?</button>
    </form>
    <div id="dkb-result">
      <p id="dkb-text"></p>
    </div>
    <hr />
    <!-- Major Question -->
    <form id="major-form">
      <label>
        What major am I?
        <select id="major-answer">
          <option value="major1">Drama</option>
          <option value="major2">Vocal</option>
          <option value="major3">Art</option>
          <option value="major4">Instrumental</option>
        </select>
      </label>
      <button type="submit">Overthink it.</button>
    </form>
    <div id="major-result">
      <p id="major-text"></p>
    </div>
  <!-- Drink Question -->
    <form id="drink-form">
      <label>
        What is my favorite drink?
        <select id="drink-answer">
          <option value="drink1">Strawberry Milk</option>
          <option value="drink2">Iced Coffee</option>
          <option value="drink3">Sprite</option>
          <option value="drink4">Matcha</option>
        </select>
      </label>
      <button type="submit">You thirsty yet?</button>
    </form>
    <div id="drink-result">
      <p id="drink-text"></p>
    </div>
    <hr />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Bias Question jQuery Code
      $("#dkb-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#dkb-answer");
        var answer = $answer.val();

        if (answer === "dkb3") {
          $("#dkb-text").text("i'd be personally offended if you got this wrong. yes! my bias is Harry-June <3");
        } 
        else {
          $("#dkb-text").text("i've done at least four projects about him. you didn't get this right, and i'm rather impressed.");
        }
      });

      //=======================Major Question jQuery Code
      $("#major-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#major-answer");
        var answer = $answer.val();

        if (answer === "major2") {
          $("#major-text").text("hayyee you got it! come to the show choir show... on may 8th... ok...?");
        } 
        else {
          $("#major-text").text("yea i get that a lot, but no");
        }
      });

        //=======================Drink Question jQuery Code
      $("#drink-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#drink-answer");
        var answer = $answer.val();

        if (answer === "drink4") {
          $("#drink-text").text("yumyyyummum... matcja....");
        } 
        else {
          $("#drink-text").text("nah man");
        }
      });
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
